<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sara Priscila Cavalcanti - Gerador de Documentos Jurídicos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
    <header class="top-header">
        <div class="header-content">
            <h1>SARA PRISCILA CAVALCANTI</h1>
            <h2>ADVOGADA</h2>
            <p>Gerador Automático de Documentos</p>
        </div>
    </header>

    <main class="container">
        <form id="docForm" autocomplete="off">
            
            <section class="card">
                <h3>1. Selecione os Documentos</h3>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" name="docs" value="procuracao"> Procuração</label>
                    <label class="checkbox-item"><input type="checkbox" name="docs" value="contrato" id="checkContrato"> Contrato de Honorários</label>
                    <label class="checkbox-item"><input type="checkbox" name="docs" value="hipossuficiencia"> Declaração de Hipossuficiência</label>
                    <label class="checkbox-item"><input type="checkbox" name="docs" value="renuncia"> Termo de Renúncia</label>
                </div>
            </section>

            <section class="card">
                <h3>2. Dados do Contratante</h3>
                <div class="grid-3">
                    <div class="input-group">
                        <label for="nome">Nome Completo *</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="input-group">
                        <label for="cpf">CPF *</label>
                        <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" required>
                    </div>
                    <div class="input-group">
                        <label for="rg">RG *</label>
                        <input type="text" id="rg" required>
                    </div>
                </div>

                <div class="grid-3 mt-15">
                    <div class="input-group">
                        <label for="nacionalidade">Nacionalidade *</label>
                        <input type="text" id="nacionalidade" placeholder="Ex: Brasileiro(a)" required>
                    </div>
                    <div class="input-group">
                        <label for="estadoCivil">Estado Civil *</label>
                        <select id="estadoCivil" required>
                            <option value="">Selecione...</option>
                            <option value="Solteiro(a)">Solteiro(a)</option>
                            <option value="Casado(a)">Casado(a)</option>
                            <option value="Divorciado(a)">Divorciado(a)</option>
                            <option value="Viúvo(a)">Viúvo(a)</option>
                            <option value="União Estável">União Estável</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="profissao">Profissão *</label>
                        <input type="text" id="profissao" required>
                    </div>
                </div>

                <div class="grid-3 mt-15">
                    <div class="input-group">
                        <label for="cep">CEP *</label>
                        <input type="text" id="cep" maxlength="9" placeholder="00000-000" required>
                    </div>
                    <div class="input-group span-2">
                        <label for="endereco">Endereço (Rua, Av...) *</label>
                        <input type="text" id="endereco" required>
                    </div>
                </div>

                <div class="grid-3 mt-15">
                    <div class="input-group">
                        <label for="numero">Número *</label>
                        <input type="text" id="numero" required>
                    </div>
                    <div class="input-group">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento">
                    </div>
                    <div class="input-group">
                        <label for="bairro">Bairro *</label>
                        <input type="text" id="bairro" required>
                    </div>
                </div>

                <div class="grid-2 mt-15">
                    <div class="input-group">
                        <label for="cidade">Cidade *</label>
                        <input type="text" id="cidade" required>
                    </div>
                    <div class="input-group">
                        <label for="estado">Estado (UF) *</label>
                        <input type="text" id="estado" maxlength="2" placeholder="Ex: RJ" required>
                    </div>
                </div>
            </section>

            <section class="card">
                <label class="checkbox-item bold-label">
                    <input type="checkbox" id="checkMenor"> Contratante menor de idade (Exige Representante Legal)
                </label>
                
                <div id="sectionRepresentante" class="hidden mt-15">
                    <hr class="divider">
                    <h3 class="mt-15">Dados do Representante Legal</h3>
                    <div class="grid-3">
                        <div class="input-group">
                            <label for="repNome">Nome Completo</label>
                            <input type="text" id="repNome">
                        </div>
                        <div class="input-group">
                            <label for="repCpf">CPF</label>
                            <input type="text" id="repCpf" maxlength="14" placeholder="000.000.000-00">
                        </div>
                        <div class="input-group">
                            <label for="repEstadoCivil">Estado Civil</label>
                            <select id="repEstadoCivil">
                                <option value="">Selecione...</option>
                                <option value="Solteiro(a)">Solteiro(a)</option>
                                <option value="Casado(a)">Casado(a)</option>
                                <option value="Divorciado(a)">Divorciado(a)</option>
                                <option value="Viúvo(a)">Viúvo(a)</option>
                                <option value="União Estável">União Estável</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group mt-15">
                        <label for="repEndereco">Endereço Completo do Representante</label>
                        <input type="text" id="repEndereco" placeholder="Rua, número, bairro, cidade, UF, CEP">
                    </div>
                </div>
            </section>

            <section id="sectionContrato" class="card hidden">
                <h3>3. Detalhes do Contrato</h3>
                
                <div class="input-group mb-15">
                    <label for="objetoContrato">Objeto do Contrato *</label>
                    <select id="objetoContrato">
                        <option value="">Selecione o objeto...</option>
                        <option value="ação para os valores retroativos do LOAS.">1. Ação para valores retroativos do LOAS</option>
                        <option value="exoneração de alimentos.">2. Exoneração de alimentos</option>
                        <option value="reclamação trabalhista.">3. Reclamação trabalhista</option>
                        <option value="concessão do Benefício de Prestação Continuada (LOAS) em face do INSS.">4. Concessão de BCP/LOAS (Judicial)</option>
                        <option value="salário maternidade.">5. Salário maternidade</option>
                        <option value="divórcio consensual extrajudicial com partilha.">6. Divórcio consensual extrajudicial</option>
                        <option value="ação indenizatória (negativação indevida).">7. Indenizatória (Negativação indevida)</option>
                        <option value="ação de indenização por danos morais.">8. Indenização por danos morais</option>
                    </select>
                </div>

          <div class="grid-2">
    <div class="input-group">
        <label for="tipoHonorario">Tipo de Honorários *</label>
        <select id="tipoHonorario">
            <option value="">Selecione...</option>
            <option value="percentual">Percentual (%)</option>
            <option value="valor_fixo">Valor Fixo (R$)</option>
        </select>
    </div>
    <div class="input-group hidden" id="divValorHonorario">
        <label id="labelValorHonorario" for="valorHonorario">Valor/Porcentagem *</label>
        <input type="text" id="valorHonorario">
    </div>
</div>

<div class="input-group mt-15">
    <label for="obsHonorarios">Observações Adicionais (Honorários/Pagamento)</label>
    <textarea id="obsHonorarios" rows="3" placeholder="Ex: Pagamento em 10x via boleto ou 30% do proveito econômico ao final."></textarea>
</div>
            </section>

            <div class="actions">
                <button type="submit" class="btn-primary" id="btnGerar">Gerar Documentos</button>
                <div id="statusMessage" class="status-message"></div>
            </div>

        </form>
    </main>
    <script src="script.js"></script>
<link rel="manifest" href="manifest.json">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker registrado com sucesso!', reg.scope))
                    .catch(err => console.log('Falha ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
